name: ci-billing

on:
  pull_request:
  push:
    branches: [main]

jobs:
  billing:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Billing CI
        run: npm run ci:billing
