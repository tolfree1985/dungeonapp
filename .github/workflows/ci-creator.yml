name: ci-creator

on:
  pull_request:
  push:
    branches: [main]

jobs:
  creator:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Creator CI
        run: npm run ci:creator

      - name: Runtime determinism guards
        run: |
          npm run test-runtime-contract
          npm run test-resolver-golden
          npm run test-gate-markers

      - name: Replay golden
        run: npm run test-replay-golden

      - name: Process turn guard
        run: npm run test-process-turn-replay

      - name: Full release gate
        run: npm run run-release-gate
