name: ci-creator

on:
  pull_request:
  push:
    branches: [main]

jobs:
  creator:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Creator CI
        run: npm run ci:creator
